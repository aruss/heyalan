services:
  grafana:
    image: 'grafana/grafana:12.4.2'
    user: '0:0'
    ports:
      - '3000:3000'
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_AUTH_DISABLE_LOGIN_FORM=false
      - 'GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER}'
      - 'GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}'
    volumes:
      -
        type: bind
        source: ./grafana.datasources.yaml
        target: /etc/grafana/provisioning/datasources/datasources.yaml
    depends_on:
      loki:
        condition: service_healthy
      tempo:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - 'wget --no-verbose --tries=1 --spider http://127.0.0.1:3000/api/health || exit 1'
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 1s
    restart: unless-stopped
    networks:
      - coolify
      - default
    labels:
      - traefik.enable=true
      - traefik.http.services.webapp-cte0e3m4zma6wnt4dnme8e9y.loadbalancer.server.port=3000
      - traefik.http.services.webapp-cte0e3m4zma6wnt4dnme8e9y.loadbalancer.server.scheme=http
      - traefik.http.services.webapp-cte0e3m4zma6wnt4dnme8e9y.loadbalancer.passhostheader=true
      - traefik.http.services.webapp-cte0e3m4zma6wnt4dnme8e9y.loadbalancer.responseforwarding.flushinterval=100ms
      - traefik.http.routers.webapp-cte0e3m4zma6wnt4dnme8e9y.rule=Host(`grafana-cte0e3m4zma6wnt4dnme8e9y.ops.buyalan.com`)
      - traefik.http.routers.webapp-cte0e3m4zma6wnt4dnme8e9y.entrypoints=https
      - traefik.http.routers.webapp-cte0e3m4zma6wnt4dnme8e9y.tls.certresolver=letsencrypt
      - traefik.docker.network=coolify
      - traefik.http.routers.webapp-cte0e3m4zma6wnt4dnme8e9y.service=webapp-cte0e3m4zma6wnt4dnme8e9y
  loki:
    image: 'grafana/loki:3.6.8'
    user: '0:0'
    command: '-config.file=/etc/loki/local-config.yaml'
    volumes:
      -
        type: bind
        source: ./loki.config.yaml
        target: /etc/loki/local-config.yaml
    ports:
      - '3100:3100'
    healthcheck:
      test:
        - CMD
        - /usr/bin/loki
        - '-verify-config=true'
        - '-config.file=/etc/loki/local-config.yaml'
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 1s
    restart: unless-stopped
    networks:
      - coolify
      - default
  tempo:
    image: 'grafana/tempo:2.10.0'
    user: '0:0'
    command: '-config.file=/etc/tempo.yaml'
    volumes:
      -
        type: bind
        source: ./tempo.config.yaml
        target: /etc/tempo.yaml
    ports:
      - '3200:3200'
    healthcheck:
      test:
        - CMD
        - /tempo
        - '-config.verify=true'
        - '-config.file=/etc/tempo.yaml'
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 1s
    restart: unless-stopped
    networks:
      - coolify
      - default
  otel-collector:
    image: 'otel/opentelemetry-collector-contrib:0.148.0'
    user: '0:0'
    command: '--config=/etc/otelcol-contrib/config.yaml'
    volumes:
      -
        type: bind
        source: ./otel-collector.config.yaml
        target: /etc/otelcol-contrib/config.yaml
    ports:
      - '4317:4317'
      - '4318:4318'
      - '13133:13133'
    healthcheck:
      test:
        - CMD
        - /otelcol-contrib
        - validate
        - '--config=/etc/otelcol-contrib/config.yaml'
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 1s
    restart: unless-stopped
    depends_on:
      loki:
        condition: service_healthy
      tempo:
        condition: service_healthy
    networks:
      - coolify
      - default
networks:
  coolify:
    external: true
