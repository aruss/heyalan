services:
  grafana:
    image: "grafana/grafana:latest"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    volumes:
      - "grafana-data:/var/lib/grafana"
    labels:
      - traefik.enable=true
      - traefik.http.services.grafana-sgk4kc08gg04wcs44004cw48.loadbalancer.server.port=3000
      - traefik.http.services.grafana-sgk4kc08gg04wcs44004cw48.loadbalancer.server.scheme=http
      - traefik.http.services.grafana-sgk4kc08gg04wcs44004cw48.loadbalancer.passhostheader=true
      - traefik.http.services.grafana-sgk4kc08gg04wcs44004cw48.loadbalancer.responseforwarding.flushinterval=100ms
      - traefik.http.routers.grafana-sgk4kc08gg04wcs44004cw48.rule=Host(`grafana.ops.buyalan.com`)
      - traefik.http.routers.grafana-sgk4kc08gg04wcs44004cw48.entrypoints=https
      - traefik.http.routers.grafana-sgk4kc08gg04wcs44004cw48.tls.certresolver=letsencrypt
      - traefik.docker.network=coolify
    healthcheck:
      test:
        - CMD
        - curl
        - "-f"
        - "http://127.0.0.1:3000/api/health"
      interval: 5s
      timeout: 20s
      retries: 10
    networks:
      - coolify
      - default

  loki:
    image: "grafana/loki:latest"
    command: "-config.file=/etc/loki/local-config.yaml"
    volumes:
      - "loki-data:/loki"
    networks:
      - coolify
      - default
    restart: unless-stopped

  tempo:
    image: "grafana/tempo:latest"
    volumes:
      - "tempo_data:/var/tempo"
    networks:
      - coolify
      - default
    restart: unless-stopped

  otel-collector:
    image: "otel/opentelemetry-collector-contrib:latest"
    ports:
      - "4317:4317"
      - "4318:4318"
    depends_on:
      - loki
      - tempo
    networks:
      - coolify
      - default
    restart: unless-stopped

networks:
  coolify:
    external: true
