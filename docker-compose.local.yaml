services:
  # ---------------------------------------------------------------------------
  # Infrastructure: Postgres
  # ---------------------------------------------------------------------------
  buyalan-postgres:
    image: postgres:16-alpine
    container_name: buyalan-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      # Default DB is 'postgres'; Initializer will create specific DBs
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5


  # ---------------------------------------------------------------------------
  # Infrastructure: Creates postgres databases
  # ---------------------------------------------------------------------------
  buyalan-db-init:
    image: postgres:16-alpine
    container_name: buyalan-db-init
    depends_on:
      buyalan-postgres:
        condition: service_healthy
    environment:
      PGHOST: buyalan-postgres
      PGUSER: postgres
      PGPASSWORD: ${POSTGRES_PASSWORD:-postgres}
    command: >
      sh -c "
        echo 'Checking for databases...';
        psql -tc \"SELECT 1 FROM pg_database WHERE datname = 'buyalandb'\" | grep -q 1 || createdb buyalandb;
        echo 'Initialization complete.'
      "

  buyalan-pgadmin:
    image: dpage/pgadmin4
    container_name: buyalan-pgadmin
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@buyalan.ai}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-Passwort123!}
    depends_on:
      - buyalan-postgres

  buyalan-minio:
    image: quay.io/minio/minio
    container_name: buyalan-minio
    command: server /data --console-address :9001
    ports:
      - "9000:9000" # API
      - "9001:9001" # Console
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_USER:-minioadmin}
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
    depends_on:
      buyalan-postgres:
        condition: service_healthy
      buyalan-db-init:
        condition: service_completed_successfully

  # ---------------------------------------------------------------------------
  # Application: Initializer (Migrations & Bucket Setup)
  # ---------------------------------------------------------------------------
  buyalan-initializer:
    image: europe-west10-docker.pkg.dev/econduct/dev-docker/buyalan-initializer:latest
    container_name: buyalan-initializer
    environment:
      # Connects to default 'postgres' DB or creates 'buyalandb' on fly depending on logic
      ConnectionStrings__buyalandb: Host=buyalan-postgres;Port=5432;Database=buyalandb;Username=postgres;Password=${POSTGRES_PASSWORD:-postgres}
      MINIO_ENDPOINT: http://buyalan-minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-parent@buyalan.ai}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Passwort123!}
    depends_on:
      buyalan-postgres:
        condition: service_healthy
      buyalan-minio:
        condition: service_healthy
      buyalan-db-init:
        condition: service_completed_successfully
   

  # ---------------------------------------------------------------------------
  # AI Gateway: LiteLLM
  # ---------------------------------------------------------------------------
  buyalan-litellm:
    image: ghcr.io/berriai/litellm:litellm_stable_release_branch-v1.77.5-stable
    container_name: buyalan-litellm
    ports:
      - "4000:4000"
    volumes:
      - ./BuyAlan.AppHost/LiteLLM/config.yaml:/app/config.yaml
    environment:
      # Connects to 'litellmdb' which must be created by Initializer first
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@buyalan-postgres:5432/litellmdb?schema=litellm
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
    command: --config /app/config.yaml
    depends_on:
      # Wait for initializer to create the DB structure
      buyalan-initializer:
        condition: service_completed_successfully

  # ---------------------------------------------------------------------------
  # Application: Web API
  # ---------------------------------------------------------------------------
  buyalan-webapi:
    image: europe-west10-docker.pkg.dev/econduct/dev-docker/buyalan-webapi:latest
    container_name: buyalan-webapi
    environment:
      ConnectionStrings__buyalandb: Host=buyalan-postgres;Port=5432;Database=buyalandb;Username=postgres;Password=${POSTGRES_PASSWORD:-postgres}
      Logging__LogLevel__Default: Debug
      LITELLM_ENDPOINT: http://buyalan-litellm:4000
      LITELLM_API_KEY: ${LITELLM_MASTER_KEY}
      MINIO_ENDPOINT: http://buyalan-minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_SERVICE_NAME: buyalan-webapi
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
    ports:
      - "5000:5000"
    healthcheck:
      test: 'wget --no-verbose --tries=1 --spider http://localhost:5000/health || exit 1'
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
    depends_on:
      buyalan-initializer:
        condition: service_completed_successfully
      buyalan-postgres:
        condition: service_healthy
      buyalan-litellm:
        condition: service_started
      buyalan-minio:
        condition: service_healthy


  # ---------------------------------------------------------------------------
  # Application: Web API
  # ---------------------------------------------------------------------------
  buyalan-webapp:
    image: europe-west10-docker.pkg.dev/econduct/dev-docker/buyalan-webapp:latest
    container_name: buyalan-webapp
    ports:
      - "3300:3300"
    environment:
      NODE_ENV: production
      WEBAPI_ENDPOINT: http://buyalan-webapi:5000
      NODE_OPTIONS: --dns-result-order=ipv4first
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_SERVICE_NAME: buyalan-webapp
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
    healthcheck:
      test: 'wget --no-verbose --tries=1 --spider http://localhost:3300/health || exit 1'
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
    depends_on:
      buyalan-webapi:
        condition: service_started

volumes:
  pgdata:
  miniodata: