services:
  grafana:
    image: grafana/grafana:12.4.2
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_AUTH_DISABLE_LOGIN_FORM=false
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=your_secure_password
    volumes:
      - ./grafana.datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml
    depends_on:
      loki:
        condition: service_healthy
      tempo:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:3000/api/health || exit 1"]
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 1s
    restart: unless-stopped

  prometheus:
    image: 'prom/prometheus:v3.1.0'
    command:
      - '--config.file=/etc/prometheus/prometheus.yaml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    volumes:
      - ./prometheus.yaml:/etc/prometheus/prometheus.yaml
    ports:
      - '9090:9090'
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  loki:
    image: grafana/loki:3.6.8
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./loki.config.yaml:/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    healthcheck:
      test: ["CMD", "/usr/bin/loki", "-verify-config=true", "-config.file=/etc/loki/local-config.yaml"]
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 1s
    restart: unless-stopped

  tempo:
    image: grafana/tempo:2.10.0
    command: -config.file=/etc/tempo.yaml
    volumes:
      - ./tempo.config.yaml:/etc/tempo.yaml
    ports:
      - "3200:3200"
    healthcheck:
      test: ["CMD", "/tempo", "-config.verify=true", "-config.file=/etc/tempo.yaml"]
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 1s
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.148.0
    command: --config=/etc/otelcol-contrib/config.yaml
    volumes:
      - ./otel-collector.config.yaml:/etc/otelcol-contrib/config.yaml
    ports:
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP
      - "13133:13133" # Health Check Extension
    healthcheck:
      test: ["CMD", "/otelcol-contrib", "validate", "--config=/etc/otelcol-contrib/config.yaml"]
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 1s
    restart: unless-stopped
    depends_on:
      loki:
        condition: service_healthy
      tempo:
        condition: service_healthy
