services:
  grafana:
    image: grafana/grafana:latest
    container_name: buyalan-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_FEATURE_TOGGLES_ENABLE: traceqlEditor metricsSummary
    volumes:
      - grafana-data:/var/lib/grafana
      - ./telemetry/grafana/provisioning:/etc/grafana/provisioning:ro
    healthcheck:
      test:
        - CMD
        - curl
        - -f
        - http://127.0.0.1:3000/api/health
      interval: 5s
      timeout: 20s
      retries: 10
    depends_on:
      - loki
      - tempo

  loki:
    image: grafana/loki:latest
    container_name: buyalan-loki
    restart: unless-stopped
    command:
      - -config.file=/etc/loki/config.yaml
    ports:
      - "3100:3100"
    volumes:
      - loki-data:/loki
      - ./telemetry/loki/config.yaml:/etc/loki/config.yaml:ro

  tempo:
    image: grafana/tempo:latest
    container_name: buyalan-tempo
    restart: unless-stopped
    command:
      - -config.file=/etc/tempo/config.yaml
    ports:
      - "3200:3200"
    volumes:
      - tempo-data:/var/tempo
      - ./telemetry/tempo/config.yaml:/etc/tempo/config.yaml:ro

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: buyalan-otel-collector
    restart: unless-stopped
    command:
      - --config=/etc/otelcol-contrib/config.yaml
    ports:
      - "4317:4317"
      - "4318:4318"
      - "13133:13133"
    depends_on:
      - loki
      - tempo
    volumes:
      - ./telemetry/otel-collector/config.yaml:/etc/otelcol-contrib/config.yaml:ro

volumes:
  grafana-data:
  loki-data:
  tempo-data:
